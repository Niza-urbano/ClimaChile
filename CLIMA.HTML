        function inicializarApp() {

        function calcularEstadisticas(pronostico) {
            let sumaMax = 0;
            let minSemanal = pronostico[0].min;
            let maxSemanal = pronostico[0].max;

            let contadorSoleado = 0;
            let contadorLluvioso = 0;
            let contadorNublado = 0;

            for (let i = 0; i < pronostico.length; i++) {
                let diaActual = pronostico[i];

                sumaMax += diaActual.max;

                if (diaActual.min < minSemanal) minSemanal = diaActual.min;
                if (diaActual.max > maxSemanal) maxSemanal = diaActual.max;

                if (diaActual.estado === "Soleado") contadorSoleado++;
                else if (diaActual.estado === "Lluvioso") contadorLluvioso++;
                else if (diaActual.estado === "Nublado") contadorNublado++;
            }

            let promedioMax = (sumaMax / pronostico.length).toFixed(1);

            let resumen = "";
            if (contadorSoleado >= 4) {
                resumen = "Semana mayormente soleada, ideal para actividades al aire libre.";
            } else if (contadorLluvioso >= 3) {
                resumen = "Semana fría con varias lluvias, no olvides tu paraguas.";
            } else {
                resumen = "Semana con clima variable y cielos parcialmente cubiertos.";
            }

            return {
                min: minSemanal,
                max: maxSemanal,
                prom: promedioMax,
                soleados: contadorSoleado,
                lluviosos: contadorLluvioso,
                nublados: contadorNublado,
                mensaje: resumen
            };
        }
