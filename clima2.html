<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Clima </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            background: linear-gradient(rgba(72, 175, 216, 0.197), rgba(45, 56, 104, 0.321)),
                url('assets/fondo/clima.jpg') no-repeat center center fixed;
            background-size: cover;
            color: rgba(45, 56, 104, 0.809);
        }

        .main-card {
            background: #f8f9fa31;
            color: rgba(45, 56, 104, 0.809);
            border-radius: 20px;
            border: 1px solid #eee;
            padding: 30px;
            display: flex;
            align-items: center;
            justify-content: space-around;
        }

        .forecast-pill {
            background: #f8f9fa31;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            border: 1px solid #eee;
        }

        .stat-badge {
            background: #eef2f74e;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .weather-icon-main {
            font-size: 9rem;
            line-height: 1;
            margin-bottom: 8px;
            filter: drop-shadow(0 5px 15px rgba(255, 255, 255, 0.49));
        }

        .main-weather-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            text-align: center;
        }

        .btn-primary {
            background-color: #4f96c0;
            border: none;
        }

        .btn-primary:hover {
            background-color: #3b477f;
        }

        #inputBuscar::placeholder {
            color: rgba(45, 56, 104, 0.5);
            font-weight: 500;
        }

        #selectCiudad {
            background: #f8f9fab4;
            border-radius: 12px;
            border: 1px solid #eee;
            padding: 10px;
            font-weight: 500;
            color: rgba(45, 56, 104, 0.8);
        }

        .forecast-pill:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.204);
        }

        .mensaje-clima {
            text-align: center;
            color: #3b477f;
            padding: 10px;

        }

        .forecast-pill small {
            white-space: nowrap;
        }

        #fechaActual {
            font-weight: 500;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="container py-4">
        <h1 class="text-center fw-bold mb-2">El Tiempo</h1>
        <p id="fechaActual" class="text-center mb-3"></p>

        <div class="row justify-content-center mb-3">
            <div class="col-md-6">
                <div class="input-group">
                    <select id="selectCiudad" class="form-select" onchange="buscarPorSelect()">
                        <option value="">Selecciona una ciudad</option>
                    </select>
                </div>
            </div>
        </div>


        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div id="detalleLugar" class="glass-panel">
                </div>
            </div>
        </div>
    </div>

    <script>
        class LugarClima {

            constructor(id, nombre, lat, lon, emoji) {
                this.id = id;
                this.nombre = nombre;
                this.lat = lat;
                this.lon = lon;
                this.emoji = emoji;
                this.tempActual = 0;
                this.estadoActual = "";
                this.pronosticoSemanal = [];
            }

            calcularEstadisticas() {

                let sumaMax = 0;
                let minSemanal = this.pronosticoSemanal[0].min;
                let maxSemanal = this.pronosticoSemanal[0].max;

                let contadorSoleado = 0;
                let contadorLluvioso = 0;
                let contadorNublado = 0;

                this.pronosticoSemanal.forEach(dia => {

                    sumaMax += dia.max;

                    if (dia.min < minSemanal) minSemanal = dia.min;
                    if (dia.max > maxSemanal) maxSemanal = dia.max;

                    if (dia.estado === "Soleado") contadorSoleado++;
                    else if (dia.estado === "Lluvioso") contadorLluvioso++;
                    else contadorNublado++;

                });

                const promedioMax = Math.round(sumaMax / this.pronosticoSemanal.length);

                let resumen = "";

                if (contadorSoleado >= 4) {
                    resumen = "Semana mayormente soleada.";
                } else if (contadorLluvioso >= 3) {
                    resumen = "Semana con varias lluvias.";
                } else {
                    resumen = "Semana con clima variable.";
                }

                return {
                    min: Math.round(minSemanal),
                    max: Math.round(maxSemanal),
                    prom: promedioMax,
                    mensaje: resumen
                };

            }

        }

        const lugares = [

            new LugarClima(1, "Atacama", -27.36, -70.33, "☀️"),
            new LugarClima(2, "Antofagasta", -23.65, -70.40, "☀️"),
            new LugarClima(3, "Serena", -29.90, -71.25, "☀️"),
            new LugarClima(4, "Valparaíso", -33.05, -71.62, "☁️"),
            new LugarClima(5, "Santiago", -33.45, -70.66, "🌤️"),
            new LugarClima(6, "Talca", -35.42, -71.66, "🌤️"),
            new LugarClima(7, "Concepción", -36.82, -73.05, "🌧️"),
            new LugarClima(8, "Puerto Montt", -41.47, -72.94, "🌧️"),
            new LugarClima(9, "Coyhaique", -45.57, -72.07, "🌧️"),
            new LugarClima(10, "Punta Arenas", -53.16, -70.91, "🌧️")

        ];

        const obtenerEstadoClima = codigo => {

            if (codigo === 0) return "Soleado";
            if (codigo === 1 || codigo === 2) return "Parcialmente nublado";
            if (codigo <= 3 && codigo >=50) return "Nublado";
            if (codigo >= 51) return "Lluvioso";

            console.log("Código sin mapear:", codigo);
            return "Nublado";

        };

        const obtenerEmojiClima = (estado) => {
            const noche = esDeNoche();
            switch (estado.toLowerCase()) {
                case "soleado":
                    return noche ? "🌙" : "☀️"; // sol brillante
                case "parcialmente nublado":
                    return noche ? "🌙" : "🌤️"; // sol con nubes
                case "nublado":
                    return "☁️"; // nube
                case "lluvioso":
                    return "🌧️"; // nube con lluvia
            }
        };

        const esDeNoche = () => {
            const hora = new Date().getHours(); // 0-23
            return hora < 8 || hora >= 20;      // de 6pm a 6am = noche
        };

        async function obtenerClimaAPI(lat, lon) {

            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`;

            const respuesta = await fetch(url);

            const data = await respuesta.json();

            return data;

        }

        const cargarCiudadesSelect = () => {

            const select = document.getElementById("selectCiudad");

            lugares.forEach(lugar => {

                const option = document.createElement("option");

                option.value = lugar.nombre;
                option.textContent = lugar.nombre;

                select.appendChild(option);

            });

        };     

        const mostrarDetalle = lugar => {

            const contenedor = document.getElementById('detalleLugar');

            const stats = lugar.calcularEstadisticas();

            let htmlPronostico = '';

            lugar.pronosticoSemanal.forEach(d => {

                lugar.emoji = obtenerEmojiClima(lugar.estadoActual);


                htmlPronostico += `

                    <div class="col-6 col-sm-4 col-md-2">
                        <div class="forecast-pill shadow-sm">
                            <small class="fw-bold d-block">${d.dia}</small>
                            <span class="d-block my-1 fs-4">${obtenerEmojiClima(d.estado)}</span>
                            <small>${Math.round(d.min)}° / ${Math.round(d.max)}°</small>
                        </div>
                    </div>

                    `;

            });

            contenedor.innerHTML = `

                    <div class="main-card mb-4 shadow-sm">

                        <div class="weather-icon-main">${obtenerEmojiClima(lugar.estadoActual)}</div>

                        <div>
                            <h2 class="display-5  mb-0">${lugar.nombre}</h2>
                            <div class="display-3 fw-bold">${Math.round(lugar.tempActual)}°C</div>
                            <p class="mb-0" style="letter-spacing: 1px; font-weight:500;">Actual: ${lugar.estadoActual}</p>
                        </div>

                    </div>

                    <h5 class="flex-wrap fw-bold mb-3" >Pronóstico Semanal</h5>

                    <div class="row g-2 mb-4">${htmlPronostico}</div>

                    <div class="stats-panel border-top pt-4">

                        <h5 class="fw-bold mb-3">Estadísticas de la semana</h5>

                        <div class="row text-center mb-3">

                            <div class="col-4">
                                <div class="stat-badge">
                                    <small>Mín</small><br>
                                    <b>${stats.min}°C</b>
                                </div>
                            </div>

                            <div class="col-4">
                                <div class="stat-badge">
                                    <small>Máx</small><br>
                                    <b>${stats.max}°C</b>
                                </div>
                            </div>

                            <div class="col-4">
                                <div class="stat-badge">
                                    <small>Prom</small><br>
                                    <b>${stats.prom}°C</b>
                                </div>
                            </div>

                        </div>

                        <div class="mensaje-clima">
                            <p>${stats.mensaje}</p>
                        </div>

                    </div>

                    `;

        };

        const mostrarFechaActual = () => {

            const hoy = new Date();

            const dias = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];

            const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];

            const diaSemana = dias[hoy.getDay()];
            const dia = hoy.getDate();
            const mes = meses[hoy.getMonth()];
            const anio = hoy.getFullYear();

            const fecha = `${diaSemana} ${dia}, ${mes} ${anio}`;

            document.getElementById("fechaActual").textContent = fecha;

        };

        const buscarPorSelect = async () => {

            const nombre = document.getElementById("selectCiudad").value;

            const lugar = lugares.find(l => l.nombre === nombre);

            if (!lugar) return;

            const data = await obtenerClimaAPI(lugar.lat, lugar.lon);

            lugar.tempActual = data.current_weather.temperature;

            lugar.estadoActual = obtenerEstadoClima(data.current_weather.weathercode);

            lugar.pronosticoSemanal = data.daily.temperature_2m_max.slice(1).map((max, i) => ({

                dia: ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"][new Date(data.daily.time[i + 1]).getDay()],
                min: Math.round(data.daily.temperature_2m_min[i + 1]),
                max: Math.round(max),
                estado: obtenerEstadoClima(data.daily.weathercode[i + 1])

            }));

            mostrarDetalle(lugar);

        };


        const iniciarApp = async () => {

            mostrarFechaActual();
            cargarCiudadesSelect();

            const select = document.getElementById("selectCiudad");

            select.value = "Atacama";

            await buscarPorSelect();

        };


        iniciarApp();
       
    </script>

</body>

</html>
